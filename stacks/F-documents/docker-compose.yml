# Group F · Documents
# All services CPU-only, on-demand under profile `documents`.

name: puma_info_documents

services:

  quarto:
    build:
      context: .
      dockerfile: Dockerfile.quarto
    image: pumacp/puma-info-quarto:0.1.0
    container_name: puma_info_quarto
    # Run as the host user so bind-mount outputs are host-owned, not root.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../documents:/work/documents
      - ../../output:/work/output
      - ../../public:/work/public
      - ../../_private:/work/_private
    labels:
      puma_info: "true"
    profiles: ["documents"]
    networks:
      - default

  marp-mermaid:
    build:
      context: .
      dockerfile: Dockerfile.marp-mermaid
    image: pumacp/puma-info-marp-mermaid:0.1.0
    container_name: puma_info_marp_mermaid
    # Run as the host user so bind-mount outputs are host-owned, not root.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../documents:/work/documents
      - ../../output:/work/output
      - ../../public:/work/public
      - ../../_private:/work/_private
    labels:
      puma_info: "true"
    profiles: ["documents"]
    networks:
      - default

  inkscape:
    build:
      context: .
      dockerfile: Dockerfile.inkscape
    image: pumacp/puma-info-inkscape:0.1.0
    container_name: puma_info_inkscape
    # Run as the host user so bind-mount outputs are host-owned, not root.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../documents:/work/documents
      - ../../output:/work/output
      - ../../public:/work/public
      - ../../_private:/work/_private
    labels:
      puma_info: "true"
    profiles: ["documents"]
    networks:
      - default

  libreoffice:
    build:
      context: .
      dockerfile: Dockerfile.libreoffice
    image: pumacp/puma-info-libreoffice:0.1.0
    container_name: puma_info_libreoffice
    # Run as the host user so bind-mount outputs are host-owned, not root.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../documents:/work/documents
      - ../../output:/work/output
      - ../../public:/work/public
      - ../../_private:/work/_private
    labels:
      puma_info: "true"
    profiles: ["documents"]
    networks:
      - default

networks:
  default:
    external: true
    name: puma_info_network
