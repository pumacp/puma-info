# Group C · Voice
# Two services: piper (CPU) and xtts (GPU). Both on-demand under
# profile `voice`. Volumes persist models across container recreates.

name: puma_info_voice

services:

  piper:
    build:
      context: .
      dockerfile: Dockerfile.piper
    image: pumacp/puma-info-piper:0.1.0
    container_name: puma_info_piper
    # Run as the host user so bind-mount narration output is host-owned, not root.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../voice/piper_models:/voices/external
      - ../../compositions:/work/compositions
      - ../../public:/work/public
      - ../../_private:/work/_private
      - puma_info_piper_data:/data
    labels:
      puma_info: "true"
    profiles: ["voice"]
    networks:
      - default

  xtts:
    build:
      context: .
      dockerfile: Dockerfile.xtts
    image: pumacp/puma-info-xtts:0.1.0
    container_name: puma_info_xtts
    # Run as the host user so cloned-voice output is host-owned, not root.
    # Model is baked at /opt/share/tts (readable); HOME=/tmp for runtime writes.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    volumes:
      - ../../voice/reference:/work/reference:ro
      - ../../voice/xtts_models:/work/models
      - ../../compositions:/work/compositions
      - ../../public:/work/public
      - ../../_private:/work/_private
    environment:
      - COQUI_TOS_AGREED=1
      - HOME=/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      puma_info: "true"
      gpu: "true"
    profiles: ["voice"]
    networks:
      - default

volumes:
  puma_info_piper_data:
    labels:
      puma_info: "true"

networks:
  default:
    external: true
    name: puma_info_network
