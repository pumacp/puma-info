# Group E · Publish
# WhisperX (GPU) + YouTube uploader (CPU). Both on-demand under
# profile `publish`.

name: puma_info_publish

services:

  whisperx:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    image: pumacp/puma-info-whisperx:0.1.0
    container_name: puma_info_whisper
    # Run as the host user so subtitle output is host-owned, not root.
    # Models are baked at /opt/cache (readable + runtime-writable); HOME=/tmp.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../output:/work
      - ../../public:/work/public
      - ../../_private:/work/_private
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      puma_info: "true"
      gpu: "true"
    profiles: ["publish"]
    networks:
      - default

  uploader:
    build:
      context: .
      dockerfile: Dockerfile.uploader
    image: pumacp/puma-info-uploader:0.1.0
    container_name: puma_info_uploader
    # Run as the host user so bind-mount outputs are host-owned, not root.
    user: "${PUMA_UID:-1000}:${PUMA_GID:-1000}"
    environment:
      - HOME=/tmp
    volumes:
      - ../../output:/work/output
      - ../../secrets:/work/secrets:ro
      - ../../orchestrator:/work/orchestrator:ro
    labels:
      puma_info: "true"
    profiles: ["publish"]
    networks:
      - default

networks:
  default:
    external: true
    name: puma_info_network
